<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Movies - Movie Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/" th:href="@{/}">Movie Library</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/" th:href="@{/}">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/add-movie" th:href="@{/add-movie}">Add Movie</a></li>
                <li class="nav-item"><a class="nav-link active" href="/movies" th:href="@{/movies}">Movies</a></li>
                <li class="nav-item"><a class="nav-link" href="/about" th:href="@{/about}">About</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <h1>All Movies</h1>

    <!-- Filters -->
    <form th:action="@{/movies}" method="get" class="row g-3 mb-4">
        <div class="col-md-3">
            <input type="text" name="genre" th:value="${genre}" class="form-control" placeholder="Filter by genre">
        </div>
        <div class="col-md-3">
            <input type="number" name="year" th:value="${year}" class="form-control" placeholder="Filter by year">
        </div>
        <div class="col-md-3">
            <select name="sort" class="form-select">
                <option value="">Sort by</option>
                <option value="title,asc">Title ↑</option>
                <option value="title,desc">Title ↓</option>
                <option value="year,asc">Year ↑</option>
                <option value="year,desc">Year ↓</option>
            </select>
        </div>
        <div class="col-md-3">
            <button type="submit" class="btn btn-primary">Apply</button>
        </div>
    </form>

    <!-- Movie Table -->
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Title</th>
                <th>Genre</th>
                <th>Year</th>
                <th>Rating</th>
                <th>Added On</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="movie : ${movies}">
                <td th:text="${movie.title}">Movie Title</td>
                <td th:text="${movie.genre}">Genre</td>
                <td th:text="${movie.year}">Year</td>
                <td th:text="${movie.rating}">Rating</td>
                <td th:text="${#temporals.format(movie.createdAt, 'yyyy-MM-dd HH:mm')}">Timestamp</td>
            </tr>
        </tbody>
    </table>
</div>

<footer class="bg-dark text-white text-center py-3 mt-4">
    &copy; 2026 Movie Library
</footer>
</body>
</html>
