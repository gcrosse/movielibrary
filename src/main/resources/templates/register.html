<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
</head>
<body>
<h2>Register</h2>
<form method="post" action="/register" th:object="${user}">
    First Name: <input type="text" th:field="*{firstName}"><br><br>
    Last Name: <input type="text" th:field="*{lastName}"><br><br>
    Email: <input type="email" th:field="*{email}"><br><br>
    Username: <input type="text" th:field="*{username}"><br><br>
    Password: <input type="password" th:field="*{password}"><br><br>
    <button type="submit">Register</button>
</form>
<p>Already have an account? <a href="/login">Login here</a></p>
</body>
</html>
