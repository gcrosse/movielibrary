version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: movielibrary-mysql
    environment:
      MYSQL_DATABASE: movielibrarydb
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: movielibrary-app
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "qa"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/movielibrarydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: "rootpassword"

volumes:
  mysql_data: